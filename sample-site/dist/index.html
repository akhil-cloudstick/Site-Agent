<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ayurveda Wellness</title>
  <style>
    body { margin: 0; font-family: Georgia, serif; color: #2b2b2b; }
    .hero { padding: 80px 40px; text-align: center; background: #f3efe6; }
    .hero img { width: 240px; height: 160px; object-fit: cover; border-radius: 12px; margin-top: 20px; }
    .hero h1 { font-size: 44px; margin: 0 0 12px; color: #6b4f2a; }
    .hero p { font-size: 20px; color: #5a5a5a; }
    .about { padding: 60px 40px; max-width: 680px; margin: 0 auto; text-align: center; }
    .about h2 { color: #6b4f2a; }
    .cta { display: inline-block; margin-top: 16px; padding: 12px 26px; background: #6b4f2a; color: #fff; border-radius: 8px; }
    footer { text-align: center; padding: 24px; color: #888; }
  </style>
</head>
<body>
  <!-- This is the client's BUILT, deployed page. Some elements carry data-sa
       markers (stable keys); others are left unmarked to prove auto-detection. -->
  <section class="hero">
    <h1 data-sa="text:hero.heading">Welcome to Ayurveda Wellness</h1>
    <p data-sa="text:hero.subheading">Natural healing, the traditional way.</p>
    <img data-sa="image:hero.image" src="/images/hero.jpg" alt="Clinic" />
  </section>
  <section class="about">
    <h2 data-sa="text:about.title">About Us</h2>
    <p data-sa="text:about.body">We have practiced authentic Ayurveda for over 20 years.</p>
    <span class="cta" data-sa="text:cta.button">Book a Consultation</span>
  </section>
  <footer>© 2026 Ayurveda Wellness. All rights reserved.</footer>
</body>
</html>
